version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - podcast-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/podcast_rag.db
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
    restart: unless-stopped
    networks:
      - podcast-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - podcast-network

networks:
  podcast-network:
    driver: bridge

volumes:
  podcast-data:
    name: podcast-rag-data 